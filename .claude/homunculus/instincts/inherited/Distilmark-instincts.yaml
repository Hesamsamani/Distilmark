# Distilmark Workflow Release Workflow Icon Bundling

## Action

Follow the release-workflow-icon-bundling workflow:
1. Run a script to generate icon.ico from icon.png with all required sizes.
2. Update the release workflow to run the icon build script before packaging.
3. Bundle the new icon assets into the executable using PyInstaller --add-data.
4. Verify that the bundled app displays the correct icons in the window and taskbar.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: scripts/build_icon.py, .github/workflows/release.yml, icon.png

