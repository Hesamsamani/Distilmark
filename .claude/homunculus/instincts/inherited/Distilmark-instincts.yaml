# Distilmark Workflow Update Branding And App Icons

## Action

Follow the update-branding-and-app-icons workflow:
1. Create or update icon.png and icon.ico with new branding assets.
2. Update sidebar or header layout in styles and app code to use the new branding.
3. Ensure the app and bundled executables load the updated icons (including fallback logic).
4. Update release workflow to bundle the new icons with the executable.
5. Refresh screenshots in the README or docs to reflect the new branding.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: icon.png, icon.ico, distilmark/app.py

